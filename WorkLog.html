<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorkLog — 개인 업무 기록</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;
  --bg2:#161b26;
  --bg3:#1e2535;
  --bg4:#252d40;
  --border:#2a3348;
  --border2:#3a4560;
  --text:#e8ecf4;
  --text2:#8a95b0;
  --text3:#555f78;
  --accent:#4a9eff;
  --accent2:#2d7dd2;
  --green:#3ecf8e;
  --green2:#1e6e4a;
  --amber:#f59e0b;
  --amber2:#7a4e08;
  --red:#f87171;
  --red2:#7a2020;
  --purple:#a78bfa;
  --mono:'IBM Plex Mono',monospace;
}
body{font-family:'IBM Plex Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.app{display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
.sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:width 0.2s}
.sidebar-header{padding:20px 16px 14px;border-bottom:1px solid var(--border)}
.brand{display:flex;align-items:center;gap:10px}
.brand-icon{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.brand-name{font-size:14px;font-weight:600;letter-spacing:-0.02em}
.brand-sub{font-size:10px;color:var(--text3);font-family:var(--mono);margin-top:1px}
.user-info{padding:12px 16px;border-bottom:1px solid var(--border)}
.user-name-display{font-size:13px;font-weight:500;color:var(--text)}
.user-name-edit{display:flex;align-items:center;gap:6px}
.user-name-edit input{background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:4px 8px;font-size:12px;color:var(--text);font-family:'IBM Plex Sans KR',sans-serif;width:100%}
.edit-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:12px;padding:2px}
.nav{padding:8px 0;flex:1}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;font-size:13px;color:var(--text2);cursor:pointer;transition:all 0.12s;border-left:2px solid transparent}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:rgba(74,158,255,0.08);color:var(--accent);border-left-color:var(--accent)}
.nav-item svg{flex-shrink:0;opacity:0.7}
.nav-item.active svg{opacity:1}
.nav-section-label{padding:12px 16px 4px;font-size:10px;color:var(--text3);font-family:var(--mono);text-transform:uppercase;letter-spacing:0.1em}
.sidebar-footer{padding:12px 16px;border-top:1px solid var(--border)}
.admin-btn{width:100%;padding:7px 10px;background:rgba(167,139,250,0.1);border:1px solid rgba(167,139,250,0.3);border-radius:6px;color:var(--purple);font-size:12px;cursor:pointer;font-family:'IBM Plex Sans KR',sans-serif;transition:all 0.12s;display:flex;align-items:center;gap:8px;justify-content:center}
.admin-btn:hover{background:rgba(167,139,250,0.2)}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-left{display:flex;align-items:center;gap:12px}
.page-title{font-size:15px;font-weight:600;letter-spacing:-0.02em}
.topbar-clock{font-family:var(--mono);font-size:13px;color:var(--text2);background:var(--bg3);padding:4px 10px;border-radius:6px;border:1px solid var(--border)}
.content{flex:1;overflow-y:auto;padding:24px}
.page{display:none}
.page.active{display:block}

/* TODAY PAGE */
.today-hero{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:20px;position:relative;overflow:hidden}
.today-hero::before{content:'';position:absolute;top:-40px;right:-40px;width:200px;height:200px;background:radial-gradient(circle,rgba(74,158,255,0.06) 0%,transparent 70%);pointer-events:none}
.today-date-big{font-family:var(--mono);font-size:11px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.08em}
.today-greeting{font-size:20px;font-weight:600;letter-spacing:-0.03em;margin-bottom:16px}
.punch-row{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.punch-block{display:flex;align-items:center;gap:12px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 16px;flex:1;min-width:180px}
.punch-label{font-size:11px;color:var(--text3);font-family:var(--mono);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px}
.punch-time{font-family:var(--mono);font-size:22px;font-weight:500;color:var(--text)}
.punch-time.set{color:var(--green)}
.punch-btn{padding:8px 18px;border-radius:8px;border:none;font-family:'IBM Plex Sans KR',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all 0.12s}
.punch-btn.in{background:var(--green);color:#0a1a12}
.punch-btn.in:hover{background:#2aab6e}
.punch-btn.out{background:var(--bg4);border:1px solid var(--border2);color:var(--text2)}
.punch-btn.out:hover:not(:disabled){background:var(--border2);color:var(--text)}
.punch-btn:disabled{opacity:0.4;cursor:not-allowed}
.punch-status{display:flex;align-items:center;gap:8px;margin-top:12px}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--text3)}
.status-dot.working{background:var(--green);box-shadow:0 0 0 3px rgba(62,207,142,0.2);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 3px rgba(62,207,142,0.2)}50%{box-shadow:0 0 0 6px rgba(62,207,142,0.08)}}
.status-text{font-size:12px;color:var(--text2)}
.duration-chip{font-family:var(--mono);font-size:12px;background:rgba(62,207,142,0.1);color:var(--green);padding:3px 8px;border-radius:4px;border:1px solid rgba(62,207,142,0.2)}

/* CARDS ROW */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
.sc-label{font-size:11px;color:var(--text3);font-family:var(--mono);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px}
.sc-val{font-size:24px;font-weight:600;font-family:var(--mono)}
.sc-sub{font-size:11px;color:var(--text3);margin-top:3px}

/* TASK QUICK ADD */
.quick-add-bar{display:flex;gap:8px;margin-bottom:16px}
.quick-add-bar input{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:9px 14px;color:var(--text);font-size:13px;font-family:'IBM Plex Sans KR',sans-serif;outline:none;transition:border-color 0.12s}
.quick-add-bar input:focus{border-color:var(--accent)}
.quick-add-bar input::placeholder{color:var(--text3)}
.quick-add-bar select{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text2);font-size:12px;font-family:'IBM Plex Sans KR',sans-serif;cursor:pointer}
.btn{padding:8px 14px;border-radius:8px;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);font-size:13px;font-family:'IBM Plex Sans KR',sans-serif;cursor:pointer;transition:all 0.12s;display:inline-flex;align-items:center;gap:6px}
.btn:hover{background:var(--bg4);color:var(--text)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.primary:hover{background:var(--accent2)}
.btn.sm{padding:5px 10px;font-size:12px}
.btn.danger-sm{background:rgba(248,113,113,0.1);border-color:rgba(248,113,113,0.3);color:var(--red);padding:5px 8px;font-size:12px}
.btn.danger-sm:hover{background:rgba(248,113,113,0.2)}
.btn.success-sm{background:rgba(62,207,142,0.1);border-color:rgba(62,207,142,0.3);color:var(--green);padding:5px 8px;font-size:12px}

/* TASK LIST */
.task-item{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:6px;display:flex;align-items:flex-start;gap:12px;transition:border-color 0.12s}
.task-item:hover{border-color:var(--border2)}
.task-item.done{opacity:0.5}
.task-cb{width:18px;height:18px;border:1.5px solid var(--border2);border-radius:4px;cursor:pointer;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all 0.12s;background:none}
.task-cb.checked{background:var(--green);border-color:var(--green)}
.task-cb.checked::after{content:'✓';font-size:11px;color:#0a1a12;font-weight:700}
.task-body{flex:1;min-width:0}
.task-name{font-size:13px;font-weight:500;color:var(--text);line-height:1.4}
.task-name.done{text-decoration:line-through;color:var(--text3)}
.task-meta{display:flex;align-items:center;gap:8px;margin-top:5px;flex-wrap:wrap}
.tag{font-size:10px;font-family:var(--mono);padding:2px 7px;border-radius:4px;font-weight:500}
.tag.todo{background:rgba(245,158,11,0.15);color:var(--amber);border:1px solid rgba(245,158,11,0.25)}
.tag.doing{background:rgba(74,158,255,0.15);color:var(--accent);border:1px solid rgba(74,158,255,0.25)}
.tag.done{background:rgba(62,207,142,0.15);color:var(--green);border:1px solid rgba(62,207,142,0.25)}
.tag.hold{background:rgba(248,113,113,0.15);color:var(--red);border:1px solid rgba(248,113,113,0.25)}
.task-note{font-size:11px;color:var(--text3);margin-top:3px}
.task-actions{display:flex;gap:4px;flex-shrink:0}

/* FILTER BAR */
.filter-bar{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.filter-chip{padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:none;color:var(--text3);font-size:12px;font-family:'IBM Plex Sans KR',sans-serif;cursor:pointer;transition:all 0.12s}
.filter-chip:hover{border-color:var(--border2);color:var(--text2)}
.filter-chip.active{background:rgba(74,158,255,0.12);border-color:var(--accent);color:var(--accent)}

/* SECTION HEADER */
.sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sec-title{font-size:14px;font-weight:600;letter-spacing:-0.02em}
.sec-count{font-family:var(--mono);font-size:11px;color:var(--text3);background:var(--bg3);padding:2px 8px;border-radius:4px;margin-left:8px}

/* CALENDAR / REPORT */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:20px}
.cal-dow{text-align:center;font-size:11px;color:var(--text3);font-family:var(--mono);padding-bottom:6px}
.cal-day{aspect-ratio:1;border:1px solid var(--border);border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:default;font-size:13px;font-family:var(--mono);color:var(--text2);position:relative;transition:all 0.12s;background:var(--bg2)}
.cal-day.empty{background:none;border-color:transparent}
.cal-day.has-data{cursor:pointer;border-color:var(--border2)}
.cal-day.has-data:hover{border-color:var(--accent);background:rgba(74,158,255,0.06);color:var(--text)}
.cal-day.selected{border-color:var(--accent);background:rgba(74,158,255,0.12);color:var(--accent)}
.cal-day.today-marker{color:var(--accent)}
.cal-day-dot{width:5px;height:5px;border-radius:50%;background:var(--green);position:absolute;bottom:6px}
.cal-nav{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.cal-month{font-size:16px;font-weight:600;font-family:var(--mono);color:var(--text)}
.cal-nav-btn{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:5px 10px;color:var(--text2);cursor:pointer;font-size:13px;transition:all 0.12s}
.cal-nav-btn:hover{border-color:var(--border2);color:var(--text)}

/* REPORT PANEL */
.report-panel{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px;margin-top:16px}
.report-date-header{font-family:var(--mono);font-size:13px;color:var(--accent);margin-bottom:16px;letter-spacing:0.04em}
.report-section{margin-bottom:16px}
.report-section-title{font-size:11px;color:var(--text3);font-family:var(--mono);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.report-row{display:flex;align-items:baseline;gap:12px;padding:5px 0;border-bottom:1px solid rgba(42,51,72,0.5)}
.report-row:last-child{border-bottom:none}
.report-key{font-size:12px;color:var(--text3);min-width:80px;flex-shrink:0}
.report-val{font-size:13px;color:var(--text);font-family:var(--mono)}
.print-btn{background:rgba(74,158,255,0.1);border:1px solid rgba(74,158,255,0.3);color:var(--accent);padding:7px 14px;border-radius:8px;font-size:12px;font-family:'IBM Plex Sans KR',sans-serif;cursor:pointer;transition:all 0.12s;display:inline-flex;align-items:center;gap:6px}
.print-btn:hover{background:rgba(74,158,255,0.2)}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.overlay.show{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:24px;width:420px;max-width:95vw;max-height:90vh;overflow-y:auto}
.modal-title{font-size:15px;font-weight:600;margin-bottom:18px;letter-spacing:-0.02em}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:11px;color:var(--text3);font-family:var(--mono);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:5px}
.form-group input,.form-group select,.form-group textarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:13px;font-family:'IBM Plex Sans KR',sans-serif;outline:none;transition:border-color 0.12s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent)}
.form-group textarea{resize:vertical;min-height:70px;line-height:1.5}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:18px}

/* ADMIN */
.admin-log-item{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:10px 12px;margin-bottom:6px;font-family:var(--mono);font-size:12px;display:flex;gap:12px}
.log-time{color:var(--text3);flex-shrink:0}
.log-event{color:var(--text2)}
.log-detail{color:var(--text3);font-size:11px}
.admin-section{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:16px}
.admin-section-title{font-size:12px;font-weight:600;color:var(--purple);font-family:var(--mono);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:12px}

/* SCROLLBAR */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* PRINT */
@media print{
  .sidebar,.topbar,.no-print{display:none!important}
  .main{overflow:visible}
  .content{overflow:visible;padding:0}
  body,html{background:#fff;color:#000}
  .report-panel{border:1px solid #ccc;background:#fff}
  .report-section-title,.report-key{color:#666}
  .report-val,.report-date-header{color:#000}
  .tag{color:#333;border:1px solid #ccc;background:#f5f5f5}
}
</style>
</head>
<body>
<div class="app">

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="sidebar-header">
    <div class="brand">
      <div class="brand-icon">📋</div>
      <div>
        <div class="brand-name">WorkLog</div>
        <div class="brand-sub">personal</div>
      </div>
    </div>
  </div>
  <div class="user-info" id="user-info-area">
    <div style="font-size:10px;color:var(--text3);font-family:var(--mono);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px">사용자</div>
    <div class="user-name-edit">
      <input id="username-input" placeholder="이름 입력" style="font-size:13px;font-weight:500" oninput="saveUsername()">
    </div>
  </div>
  <div class="nav">
    <div class="nav-item active" onclick="showPage('today',this)">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      오늘
    </div>
    <div class="nav-item" onclick="showPage('tasks',this)">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
      업무 관리
    </div>
    <div class="nav-item" onclick="showPage('report',this)">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      보고서
    </div>
  </div>
  <div class="sidebar-footer">
    <button class="admin-btn" onclick="showAdminLogin()">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
      관리자 모드
    </button>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      <div class="page-title" id="page-title">오늘</div>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <div class="topbar-clock" id="live-clock">--:--:--</div>
    </div>
  </div>

  <div class="content">

    <!-- TODAY PAGE -->
    <div class="page active" id="page-today">
      <div class="today-hero">
        <div class="today-date-big" id="hero-date-label"></div>
        <div class="today-greeting" id="hero-greeting">좋은 하루 되세요 👋</div>
        <div class="punch-row">
          <div class="punch-block">
            <div>
              <div class="punch-label">출근</div>
              <div class="punch-time" id="in-time-display">--:--</div>
            </div>
            <button class="punch-btn in" id="btn-in" onclick="punchIn()">출근</button>
          </div>
          <div class="punch-block">
            <div>
              <div class="punch-label">퇴근</div>
              <div class="punch-time" id="out-time-display">--:--</div>
            </div>
            <button class="punch-btn out" id="btn-out" onclick="punchOut()" disabled>퇴근</button>
          </div>
        </div>
        <div class="punch-status">
          <div class="status-dot" id="status-dot"></div>
          <div class="status-text" id="status-text">출근 전</div>
          <div class="duration-chip" id="duration-chip" style="display:none"></div>
        </div>
      </div>

      <div class="stats-row" id="today-stats"></div>

      <div class="sec-header no-print">
        <div style="display:flex;align-items:center">
          <div class="sec-title">오늘 업무</div>
          <span class="sec-count" id="today-task-count">0</span>
        </div>
      </div>
      <div class="quick-add-bar no-print">
        <input id="quick-task-input" placeholder="업무 빠르게 추가... (Enter)" onkeyup="if(event.key==='Enter'&&!event.isComposing){event.preventDefault();quickAddTask();}">
        <select id="quick-task-status">
          <option value="doing">진행 중</option>
          <option value="todo">예정</option>
        </select>
        <button class="btn primary" onclick="quickAddTask()">추가</button>
      </div>
      <div id="today-task-list"></div>
    </div>

    <!-- TASKS PAGE -->
    <div class="page" id="page-tasks">
      <div class="sec-header">
        <div style="display:flex;align-items:center">
          <div class="sec-title">전체 업무</div>
          <span class="sec-count" id="all-task-count">0</span>
        </div>
        <button class="btn primary" onclick="openTaskModal()">+ 업무 추가</button>
      </div>
      <div class="filter-bar">
        <button class="filter-chip active" onclick="setFilter('all',this)">전체</button>
        <button class="filter-chip" onclick="setFilter('todo',this)">예정</button>
        <button class="filter-chip" onclick="setFilter('doing',this)">진행 중</button>
        <button class="filter-chip" onclick="setFilter('done',this)">완료</button>
        <button class="filter-chip" onclick="setFilter('hold',this)">보류</button>
      </div>
      <div id="all-task-list"></div>
    </div>

    <!-- REPORT PAGE -->
    <div class="page" id="page-report">
      <div class="cal-nav">

<script>
// ─── DATA ───────────────────────────────────────────────────────────────────
var DB = {
  get: function(k, d){ try{ var v = localStorage.getItem('wl_'+k); return v ? JSON.parse(v) : d; }catch(e){ return d; } },
  set: function(k, v){ localStorage.setItem('wl_'+k, JSON.stringify(v)); }
};

var punches  = DB.get('punches', {});   // { 'YYYY-MM-DD': {inTime, outTime} }
var tasks    = DB.get('tasks', []);
var logs     = DB.get('logs', []);
var userName = DB.get('username', '');
var taskFilter = 'all';
var calYear, calMonth;
var selectedCalDate = null;
var adminPw = DB.get('adminpw', 'admin123');
var winLogs = DB.get('winlogs', []);
var durationInterval = null;

// ─── INIT ────────────────────────────────────────────────────────────────────
function init(){
  document.getElementById('username-input').value = userName;
  var now = new Date();
  calYear = now.getFullYear();
  calMonth = now.getMonth();
  startClock();
  updateTodayHero();
  renderTodayStats();
  renderTodayTasks();
  addLog('APP_OPEN', 'WorkLog 시작');
  setHeroGreeting();
}

function saveUsername(){
  userName = document.getElementById('username-input').value.trim();
  DB.set('username', userName);
  setHeroGreeting();
}

function setHeroGreeting(){
  var h = new Date().getHours();
  var greet = h < 12 ? '좋은 아침이에요' : h < 18 ? '좋은 오후예요' : '좋은 저녁이에요';
  var name = userName ? ', ' + userName + '님' : '';
  document.getElementById('hero-greeting').textContent = greet + name + ' 👋';
}

// ─── CLOCK ───────────────────────────────────────────────────────────────────
function startClock(){
  function tick(){
    var d = new Date();
    document.getElementById('live-clock').textContent = d.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    document.getElementById('hero-date-label').textContent = d.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'long'});
    updateDuration();
  }
  tick(); setInterval(tick, 1000);
}

function nowStr(){ var d=new Date(); return d.toTimeString().slice(0,5); }
function todayKey(){ return new Date().toISOString().slice(0,10); }
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

// ─── PUNCH ────────────────────────────────────────────────────────────────────
function punchIn(){
  var key = todayKey();
  if(punches[key] && punches[key].inTime){ alert('이미 출근 처리되었습니다.'); return; }
  var t = nowStr();
  if(!punches[key]) punches[key] = {};
  punches[key].inTime = t;
  DB.set('punches', punches);
  addLog('PUNCH_IN', '출근: ' + t);
  updateTodayHero();
  renderTodayStats();
}

function punchOut(){
  var key = todayKey();
  if(!punches[key] || !punches[key].inTime){ alert('출근 기록이 없습니다.'); return; }
  if(punches[key].outTime){ alert('이미 퇴근 처리되었습니다.'); return; }
  var t = nowStr();
  punches[key].outTime = t;
  DB.set('punches', punches);
  addLog('PUNCH_OUT', '퇴근: ' + t);
  updateTodayHero();
  renderTodayStats();
}

function updateTodayHero(){
  var key = todayKey();
  var rec = punches[key] || {};
  var inEl = document.getElementById('in-time-display');
  var outEl = document.getElementById('out-time-display');
  var btnIn = document.getElementById('btn-in');
  var btnOut = document.getElementById('btn-out');
  var dot = document.getElementById('status-dot');
  var statusText = document.getElementById('status-text');
  var chip = document.getElementById('duration-chip');

  if(rec.inTime){
    inEl.textContent = rec.inTime;
    inEl.className = 'punch-time set';
    btnIn.disabled = true;
    btnIn.textContent = '출근 완료';
    btnOut.disabled = !!rec.outTime;
    dot.className = rec.outTime ? 'status-dot' : 'status-dot working';
    statusText.textContent = rec.outTime ? '퇴근 완료' : '근무 중';
    chip.style.display = rec.outTime ? 'none' : '';
  } else {
    inEl.textContent = '--:--';
    inEl.className = 'punch-time';
    btnIn.disabled = false;
    btnIn.textContent = '출근';
    btnOut.disabled = true;
    dot.className = 'status-dot';
    statusText.textContent = '출근 전';
    chip.style.display = 'none';
  }
  if(rec.outTime){
    outEl.textContent = rec.outTime;
    outEl.className = 'punch-time set';
  } else {
    outEl.textContent = '--:--';
    outEl.className = 'punch-time';
  }
}

function updateDuration(){
  var key = todayKey();
  var rec = punches[key];
  var chip = document.getElementById('duration-chip');
  if(rec && rec.inTime && !rec.outTime){
    var now = new Date();
    var parts = rec.inTime.split(':');
    var start = new Date();
    start.setHours(parseInt(parts[0]), parseInt(parts[1]), 0, 0);
    var diff = Math.floor((now - start) / 60000);
    var h = Math.floor(diff/60), m = diff%60;
    chip.textContent = h+'h '+String(m).padStart(2,'0')+'m';
  }
}

// ─── TASKS ────────────────────────────────────────────────────────────────────
function quickAddTask(){
  var name = document.getElementById('quick-task-input').value.trim();
  if(!name) return;
  if(quickAddTask._busy) return;
  quickAddTask._busy = true;
  setTimeout(function(){ quickAddTask._busy = false; }, 300);
  var status = document.getElementById('quick-task-status').value;
  var task = { id: uid(), name: name, status: status, start: todayKey(), due: '', memo: '', created: todayKey() };
  tasks.unshift(task);
  DB.set('tasks', tasks);
  document.getElementById('quick-task-input').value = '';
  addLog('TASK_ADD', '업무 추가: ' + name);
  renderTodayTasks();
  renderTodayStats();
}

function openTaskModal(id){
  document.getElementById('edit-task-id').value = id || '';
  if(id){
    var t = tasks.find(x=>x.id===id);
    if(t){
      document.getElementById('m-task-name').value = t.name;
      document.getElementById('m-task-status').value = t.status;
      document.getElementById('m-task-start').value = t.start || '';
      document.getElementById('m-task-due').value = t.due || '';
      document.getElementById('m-task-memo').value = t.memo || '';
    }
  } else {
    document.getElementById('m-task-name').value = '';
    document.getElementById('m-task-status').value = 'todo';
    document.getElementById('m-task-start').value = todayKey();
    document.getElementById('m-task-due').value = '';
    document.getElementById('m-task-memo').value = '';
  }
  document.getElementById('task-modal-overlay').classList.add('show');
}

function saveTaskModal(){
  var id = document.getElementById('edit-task-id').value;
  var name = document.getElementById('m-task-name').value.trim();
  if(!name){ alert('업무명을 입력하세요.'); return; }
  var obj = { id: id||uid(), name: name, status: document.getElementById('m-task-status').value, start: document.getElementById('m-task-start').value, due: document.getElementById('m-task-due').value, memo: document.getElementById('m-task-memo').value.trim(), created: id ? (tasks.find(t=>t.id===id)||{}).created||todayKey() : todayKey() };
  if(id){ var i=tasks.findIndex(t=>t.id===id); if(i>-1) tasks[i]=obj; }
  else tasks.unshift(obj);
  DB.set('tasks', tasks);
  closeModal('task-modal-overlay');
  addLog('TASK_EDIT', '업무 수정: ' + name);
  renderTodayTasks(); renderAllTasks(); renderTodayStats();
}

function toggleTask(id){
  var t = tasks.find(x=>x.id===id);
  if(!t) return;
  if(t.status==='done'){
    t.status='doing'; t.completedAt='';
  } else {
    t.status='done';
    var d=new Date(); t.completedAt=d.toISOString().slice(0,10)+' '+d.toTimeString().slice(0,5);
  }
  DB.set('tasks', tasks);
  addLog('TASK_TOGGLE', t.name + ' → ' + t.status);
  renderTodayTasks(); renderAllTasks(); renderTodayStats();
}

function deleteTask(id){
  var el = document.getElementById('ti-'+id);
  if(el && !el.dataset.confirmDel){
    el.dataset.confirmDel = '1';
    var btn = el.querySelector('.btn.danger-sm');
    if(btn){ btn.textContent = '확인?'; btn.style.background='rgba(248,113,113,0.35)'; }
    setTimeout(function(){ 
      if(el){ delete el.dataset.confirmDel; if(btn){btn.textContent='✕';btn.style.background='';} }
    }, 2500);
    return;
  }
  var t = tasks.find(x=>x.id===id);
  tasks = tasks.filter(x=>x.id!==id);
  DB.set('tasks', tasks);
  if(t) addLog('TASK_DEL', '삭제: '+t.name);
  renderTodayTasks(); renderAllTasks(); renderTodayStats();
}

function openNoteModal(id){
  var t = tasks.find(x=>x.id===id);
  if(!t) return;
  document.getElementById('note-edit-id').value = id;
  document.getElementById('note-edit-content').value = t.memo || '';
  document.getElementById('note-modal-overlay').classList.add('show');
}
function saveNote(){
  var id = document.getElementById('note-edit-id').value;
  var t = tasks.find(x=>x.id===id);
  if(t){ t.memo = document.getElementById('note-edit-content').value.trim(); DB.set('tasks', tasks); }
  closeModal('note-modal-overlay');
  renderTodayTasks(); renderAllTasks();
}

function changeStatus(id, val){
  var t = tasks.find(x=>x.id===id);
  if(!t) return;
  if(val==='done' && t.status!=='done'){
    var d=new Date(); t.completedAt=d.toISOString().slice(0,10)+' '+d.toTimeString().slice(0,5);
  } else if(val!=='done'){
    t.completedAt='';
  }
  t.status=val; DB.set('tasks',tasks); addLog('TASK_STATUS', t.name+' → '+val);
  renderTodayTasks(); renderAllTasks(); renderTodayStats();
}

var statusLabels = { todo:'예정', doing:'진행 중', done:'완료', hold:'보류' };

function taskHtml(t, showDate){
  var today = todayKey();
  var overdue = t.due && t.due < today && t.status !== 'done';
  return `<div class="task-item ${t.status==='done'?'done':''}" id="ti-${t.id}">
    <div class="task-cb ${t.status==='done'?'checked':''}" onclick="toggleTask('${t.id}')"></div>
    <div class="task-body">
      <div class="task-name ${t.status==='done'?'done':''}">${t.name}${overdue?'<span style="color:var(--red);font-size:11px;margin-left:6px">⚠ 지연</span>':''}</div>
      <div class="task-meta">
        <span class="tag ${t.status}">${statusLabels[t.status]||t.status}</span>
        ${t.start?`<span style="font-size:11px;color:var(--text3);font-family:var(--mono)">시작 ${t.start}</span>`:''}
        ${t.due?`<span style="font-size:11px;color:${overdue?'var(--red)':'var(--text3)'};font-family:var(--mono)">마감 ${t.due}</span>`:''}
        <select onchange="changeStatus('${t.id}',this.value)" style="font-size:11px;background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:2px 4px;color:var(--text2);font-family:'IBM Plex Sans KR',sans-serif" class="no-print">
          ${['todo','doing','done','hold'].map(s=>`<option value="${s}" ${t.status===s?'selected':''}>${statusLabels[s]}</option>`).join('')}
        </select>
      </div>
      ${t.completedAt?`<div class="task-note" style="color:var(--green);opacity:0.8">✓ 완료 ${t.completedAt}</div>`:''}
      ${t.memo?`<div class="task-note">${t.memo}</div>`:''}
    </div>
    <div class="task-actions no-print">
      <button class="btn sm" onclick="openNoteModal('${t.id}')" title="메모">📝</button>
      <button class="btn sm" onclick="openTaskModal('${t.id}')" title="수정">✏</button>
      <button class="btn danger-sm" onclick="deleteTask('${t.id}')" title="삭제">✕</button>
    </div>
  </div>`;
}

function renderTodayTasks(){
  var today = todayKey();
  var list = tasks.filter(t => t.created === today || t.start === today || (t.status==='doing' && (!t.due || t.due >= today)));
  document.getElementById('today-task-count').textContent = list.length;
  document.getElementById('today-task-list').innerHTML = list.length ? list.map(t=>taskHtml(t)).join('') : '<div style="text-align:center;padding:32px;color:var(--text3);font-size:13px">오늘 업무가 없습니다. 위에서 빠르게 추가해보세요.</div>';
}

function setFilter(f, el){
  taskFilter = f;
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  renderAllTasks();
}

function renderAllTasks(){
  var list = taskFilter==='all' ? tasks : tasks.filter(t=>t.status===taskFilter);
  document.getElementById('all-task-count').textContent = list.length;
  document.getElementById('all-task-list').innerHTML = list.length ? list.map(t=>taskHtml(t)).join('') : '<div style="text-align:center;padding:40px;color:var(--text3);font-size:13px">해당 업무가 없습니다.</div>';
}

function renderTodayStats(){
  var today = todayKey();
  var todayTasks = tasks.filter(t=>t.created===today||t.start===today);
  var doing = tasks.filter(t=>t.status==='doing').length;
  var done = tasks.filter(t=>t.status==='done'&&t.created===today).length;
  var overdue = tasks.filter(t=>t.status!=='done'&&t.due&&t.due<today).length;
  var rec = punches[today] || {};
  var hours = '--';
  if(rec.inTime && rec.outTime){
    var i=rec.inTime.split(':'), o=rec.outTime.split(':');
    var mins = (parseInt(o[0])*60+parseInt(o[1])) - (parseInt(i[0])*60+parseInt(i[1]));
    hours = (mins/60).toFixed(1)+'h';
  }
  document.getElementById('today-stats').innerHTML =
    sc('근무 시간', hours, rec.inTime?'var(--green)':'var(--text3)') +
    sc('진행 중', doing+'건', 'var(--accent)') +
    sc('오늘 완료', done+'건', 'var(--green)') +
    sc('지연 업무', overdue+'건', overdue?'var(--red)':'var(--text3)');
}

function sc(label, val, color){
  return `<div class="stat-card"><div class="sc-label">${label}</div><div class="sc-val" style="color:${color}">${val}</div></div>`;
}

// ─── CALENDAR / REPORT ────────────────────────────────────────────────────────
function renderCalendar(){
  var d = new Date(calYear, calMonth, 1);
  document.getElementById('cal-month-label').textContent = calYear+'년 '+(calMonth+1)+'월';
  var dows = ['일','월','화','수','목','금','토'];
  var grid = document.getElementById('cal-grid');
  var html = dows.map(d=>`<div class="cal-dow">${d}</div>`).join('');
  var first = d.getDay();
  for(var i=0;i<first;i++) html += '<div class="cal-day empty"></div>';
  var daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  var todayStr = todayKey();
  for(var day=1;day<=daysInMonth;day++){
    var dateKey = calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(day).padStart(2,'0');
    var hasData = !!punches[dateKey] || tasks.some(t=>t.created===dateKey||t.start===dateKey);
    var cls = 'cal-day';
    if(!hasData && dateKey!==todayStr) cls += ' ';
    if(hasData) cls += ' has-data';
    if(dateKey===todayStr) cls += ' today-marker';
    if(dateKey===selectedCalDate) cls += ' selected';
    var dot = hasData ? '<div class="cal-day-dot"></div>' : '';
    var onclick = hasData||dateKey===todayStr ? `onclick="selectCalDate('${dateKey}')"` : '';
    html += `<div class="${cls}" ${onclick}><span>${day}</span>${dot}</div>`;
  }
  grid.innerHTML = html;
}

function selectCalDate(dateKey){
  selectedCalDate = dateKey;
  renderCalendar();
  renderReportDetail(dateKey);
  document.getElementById('print-report-btn').style.display = '';
}

function renderReportDetail(dateKey){
  var rec = punches[dateKey] || {};
  var dayTasks = tasks.filter(t=>t.created===dateKey||t.start===dateKey);
  var d = new Date(dateKey);
  var weekdays = ['일','월','화','수','목','금','토'];
  var dateLabel = d.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric'}) + ' (' + weekdays[d.getDay()] + ')';

  var hours = '-';
  if(rec.inTime && rec.outTime){
    var i=rec.inTime.split(':'), o=rec.outTime.split(':');
    var mins = (parseInt(o[0])*60+parseInt(o[1])) - (parseInt(i[0])*60+parseInt(i[1]));
    hours = Math.floor(mins/60)+'시간 '+(mins%60)+'분';
  }

  var taskRows = dayTasks.length ? dayTasks.map(t=>`
    <div class="report-row">
      <span class="report-key" style="display:flex;align-items:center;gap:6px"><span class="tag ${t.status}" style="font-size:10px">${statusLabels[t.status]}</span></span>
      <span style="flex:1">
        <span class="report-val">${t.name}</span>
        ${t.due?`<span style="font-size:11px;color:var(--text3);margin-left:8px;font-family:var(--mono)">마감 ${t.due}</span>`:''}
        ${t.completedAt?`<div style="font-size:11px;color:var(--green);margin-top:2px">✓ 완료 ${t.completedAt}</div>`:''}
        ${t.memo?`<div style="font-size:11px;color:var(--text3);margin-top:3px">${t.memo}</div>`:''}
      </span>
    </div>`).join('') : '<div style="font-size:12px;color:var(--text3);padding:8px 0">업무 기록 없음</div>';

  var html = `<div class="report-panel">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <div class="report-date-header">${dateLabel}</div>
      ${userName?`<div style="font-size:12px;color:var(--text3)">${userName}</div>`:''}
    </div>
    <div class="report-section">
      <div class="report-section-title">출퇴근</div>
      <div class="report-row"><span class="report-key">출근</span><span class="report-val">${rec.inTime||'-'}</span></div>
      <div class="report-row"><span class="report-key">퇴근</span><span class="report-val">${rec.outTime||'-'}</span></div>
      <div class="report-row"><span class="report-key">근무 시간</span><span class="report-val">${hours}</span></div>
    </div>
    <div class="report-section">
      <div class="report-section-title">업무 내역 (${dayTasks.length}건)</div>
      ${taskRows}
    </div>
  </div>`;
  document.getElementById('report-detail').innerHTML = html;
}

function calPrev(){ calMonth--; if(calMonth<0){calMonth=11;calYear--;} renderCalendar(); document.getElementById('report-detail').innerHTML=''; document.getElementById('print-report-btn').style.display='none'; selectedCalDate=null; }
function calNext(){ calMonth++; if(calMonth>11){calMonth=0;calYear++;} renderCalendar(); document.getElementById('report-detail').innerHTML=''; document.getElementById('print-report-btn').style.display='none'; selectedCalDate=null; }

function printReport(){
  window.print();
  addLog('REPORT_PRINT', '보고서 인쇄: '+selectedCalDate);
}

// ─── ADMIN ────────────────────────────────────────────────────────────────────
function addLog(type, detail){
  var now = new Date();
  logs.unshift({ ts: now.toISOString(), type: type, detail: detail, page: document.title });
  if(logs.length > 500) logs = logs.slice(0,500);
  DB.set('logs', logs);
}

function showAdminLogin(){
  document.getElementById('admin-pw-input').value = '';
  document.getElementById('admin-login-overlay').classList.add('show');
  setTimeout(()=>document.getElementById('admin-pw-input').focus(), 100);
}

function checkAdminPw(){
  var pw = document.getElementById('admin-pw-input').value;
  if(pw === adminPw){
    closeModal('admin-login-overlay');
    addLog('ADMIN_LOGIN', '관리자 로그인');
    showPage('admin', document.querySelector('.nav-item.active'));
    renderAdminPage();
  } else {
    alert('비밀번호가 올바르지 않습니다.');
    addLog('ADMIN_FAIL', '관리자 로그인 실패');
  }
}

var winFilter = 'all';

function loadWinLog(){
  var input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.onchange = function(e){
    var file = e.target.files[0];
    if(!file) return;
    var reader = new FileReader();
    reader.onload = function(ev){
      try{
        var data = JSON.parse(ev.target.result);
        if(!data.logs || !Array.isArray(data.logs)){ alert('올바른 WorkLog Windows 로그 파일이 아닙니다.'); return; }
        winLogs = data.logs;
        DB.set('winlogs', winLogs);
        DB.set('winlogs_meta', { generatedAt: data.generatedAt, totalCount: data.totalCount, daysBack: data.daysBack });
        addLog('WINLOG_IMPORT', 'Windows 로그 불러오기: '+winLogs.length+'건');
        renderAdminPage();
      } catch(err){ alert('JSON 파일 파싱 오류: '+err.message); }
    };
    reader.readAsText(file, 'utf-8');
  };
  input.click();
}

function clearWinLog(){
  winLogs = [];
  DB.set('winlogs', []);
  localStorage.removeItem('wl_winlogs_meta');
  renderAdminPage();
}

function setWinFilter(f, el){
  winFilter = f;
  document.querySelectorAll('#winlog-filter-bar .filter-chip').forEach(c=>c.classList.remove('active'));
  if(el) el.classList.add('active');
  renderWinLogs();
}

var winTypeMap = {
  WIN_4624:'로그인', WIN_4634:'로그아웃', WIN_4647:'로그아웃',
  WIN_4800:'화면 잠금', WIN_4801:'잠금 해제', WIN_4802:'화면보호기', WIN_4803:'화면보호기 종료',
  WIN_SYS_6005:'시스템 시작', WIN_SYS_6006:'시스템 종료', WIN_SYS_6008:'비정상 종료',
  WIN_SYS_1074:'종료/재시작', WIN_SYS_41:'비정상 재부팅',
  WIN_PWR_42:'절전 진입', WIN_PWR_107:'절전 복귀', WIN_PWR_506:'절전 준비', WIN_PWR_507:'절전 취소'
};

var winTypeColor = {
  WIN_4624:'var(--green)', WIN_4634:'var(--red)', WIN_4647:'var(--red)',
  WIN_4800:'var(--amber)', WIN_4801:'var(--green)', WIN_4802:'var(--text3)', WIN_4803:'var(--text3)',
  WIN_SYS_6005:'var(--accent)', WIN_SYS_6006:'var(--red)', WIN_SYS_6008:'var(--red)',
  WIN_SYS_1074:'var(--amber)', WIN_SYS_41:'var(--red)',
  WIN_PWR_42:'var(--text3)', WIN_PWR_107:'var(--green)', WIN_PWR_506:'var(--text3)', WIN_PWR_507:'var(--text3)'
};

function filterWinLogs(logs){
  if(winFilter==='all') return logs;
  var map = {
    login: ['WIN_4624','WIN_4634','WIN_4647'],
    lock:  ['WIN_4800','WIN_4801','WIN_4802','WIN_4803'],
    power: ['WIN_PWR_42','WIN_PWR_107','WIN_PWR_506','WIN_PWR_507'],
    sys:   ['WIN_SYS_6005','WIN_SYS_6006','WIN_SYS_6008','WIN_SYS_1074','WIN_SYS_41']
  };
  return logs.filter(l => (map[winFilter]||[]).includes(l.type));
}

function renderWinLogs(){
  var el = document.getElementById('winlog-list');
  if(!el) return;
  var list = filterWinLogs(winLogs).slice(0,200);
  if(!list.length){ el.innerHTML='<div style="font-size:12px;color:var(--text3);padding:8px">로그 없음 — PowerShell 스크립트를 실행 후 JSON 파일을 불러오세요.</div>'; return; }
  el.innerHTML = list.map(function(l){
    var label = winTypeMap[l.type] || l.detail;
    var color = winTypeColor[l.type] || 'var(--text2)';
    var ts = l.ts ? l.ts.replace('T',' ') : '';
    var user = l.user ? '<span style="color:var(--text3);margin-left:8px">'+l.user+'</span>' : '';
    return '<div class="admin-log-item">'
      +'<span class="log-time">'+ts+'</span>'
      +'<span style="color:'+color+';min-width:80px">'+label+'</span>'
      +'<span class="log-detail">'+l.detail+user+'</span>'
      +'</div>';
  }).join('');
}

function renderAdminPage(){
  var sysInfo = [
    { k:'브라우저', v: navigator.userAgent.split(')')[0].split('(')[0].trim() + '...' },
    { k:'플랫폼', v: navigator.platform },
    { k:'화면', v: screen.width+'×'+screen.height },
    { k:'저장 용량', v: getStorageSize() },
    { k:'총 출퇴근 기록', v: Object.keys(punches).length+'일' },
    { k:'총 업무 수', v: tasks.length+'건' },
    { k:'총 로그 수', v: logs.length+'개' },
  ];
  var winMeta = DB.get('winlogs_meta', null);
  document.getElementById('winlog-meta').textContent = winMeta ? ('수집일: '+winMeta.generatedAt+' | 총 '+winLogs.length+'건 (최근 '+winMeta.daysBack+'일)') : '불러온 로그 없음';
  renderWinLogs();
  document.getElementById('admin-sysinfo').innerHTML = sysInfo.map(r=>`
    <div style="display:flex;gap:12px;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px">
      <span style="color:var(--text3);min-width:120px;font-family:var(--mono);font-size:12px">${r.k}</span>
      <span style="color:var(--text)">${r.v}</span>
    </div>`).join('');

  var logHtml = logs.length ? logs.slice(0,100).map(l=>{
    var d = new Date(l.ts);
    var ts = d.toLocaleDateString('ko-KR')+ ' ' + d.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    return `<div class="admin-log-item"><span class="log-time">${ts}</span><span class="log-event">[${l.type}]</span><span class="log-detail">${l.detail}</span></div>`;
  }).join('') : '<div style="color:var(--text3);font-size:13px;padding:8px">로그 없음</div>';
  document.getElementById('admin-log-list').innerHTML = logHtml;

  var today = todayKey();
  var thisMonth = today.slice(0,7);
  var monthPunches = Object.keys(punches).filter(k=>k.startsWith(thisMonth)).length;
  var avgIn = calcAvgTime(Object.values(punches).filter(p=>p.inTime).map(p=>p.inTime));
  var avgOut = calcAvgTime(Object.values(punches).filter(p=>p.outTime).map(p=>p.outTime));
  document.getElementById('admin-stats').innerHTML = [
    {k:'이번 달 출근 일수', v:monthPunches+'일'},
    {k:'평균 출근 시간', v:avgIn},
    {k:'평균 퇴근 시간', v:avgOut},
    {k:'완료 업무', v:tasks.filter(t=>t.status==='done').length+'건'},
    {k:'미완료 업무', v:tasks.filter(t=>t.status!=='done').length+'건'},
    {k:'지연 업무', v:tasks.filter(t=>t.status!=='done'&&t.due&&t.due<today).length+'건'},
  ].map(r=>`<div style="display:flex;gap:12px;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px"><span style="color:var(--text3);min-width:120px;font-family:var(--mono);font-size:12px">${r.k}</span><span style="color:var(--text);font-family:var(--mono)">${r.v}</span></div>`).join('');
}

function calcAvgTime(times){
  if(!times.length) return '-';
  var total = times.reduce((s,t)=>{var p=t.split(':');return s+parseInt(p[0])*60+parseInt(p[1]);},0);
  var avg = Math.round(total/times.length);
  return Math.floor(avg/60)+':'+String(avg%60).padStart(2,'0');
}

function getStorageSize(){
  var total = 0;
  ['wl_punches','wl_tasks','wl_logs','wl_username','wl_adminpw'].forEach(k=>{ var v=localStorage.getItem(k); if(v) total+=v.length; });
  return (total/1024).toFixed(1)+' KB';
}

function exportLogs(){
  var csv = 'timestamp,type,detail\n' + logs.map(l=>`"${l.ts}","${l.type}","${l.detail}"`).join('\n');
  downloadFile('worklog_logs.csv', csv, 'text/csv');
}

function clearLogs(){ logs=[]; DB.set('logs',logs); renderAdminPage(); }

function exportData(){
  var data = { punches, tasks, logs, exportedAt: new Date().toISOString() };
  downloadFile('worklog_backup.json', JSON.stringify(data, null, 2), 'application/json');
  addLog('DATA_EXPORT', '데이터 내보내기');
}

function importDataPrompt(){
  var input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.onchange = function(e){
    var file = e.target.files[0];
    var reader = new FileReader();
    reader.onload = function(ev){
      try{
        var data = JSON.parse(ev.target.result);
        if(true){
          punches = data.punches || {}; tasks = data.tasks || []; logs = data.logs || [];
          DB.set('punches',punches); DB.set('tasks',tasks); DB.set('logs',logs);
          alert('가져오기 완료');
          addLog('DATA_IMPORT', '데이터 가져오기');
          renderAdminPage();
        }
      }catch(e){ alert('파일 형식이 올바르지 않습니다.'); }
    };
    reader.readAsText(file);
  };
  input.click();
}

function resetAllData(){
  ['wl_punches','wl_tasks','wl_logs'].forEach(k=>localStorage.removeItem(k));
  punches={}; tasks=[]; logs=[];
  addLog('DATA_RESET', '전체 초기화');
  alert('초기화 완료');
  renderAdminPage();
}

function downloadFile(name, content, type){
  var a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content], {type}));
  a.download = name; a.click();
}

// ─── NAVIGATION ───────────────────────────────────────────────────────────────
function showPage(id, activeEl){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  if(activeEl) activeEl.classList.add('active');
  var titles = {today:'오늘', tasks:'업무 관리', report:'보고서', admin:'관리자'};
  document.getElementById('page-title').textContent = titles[id] || id;
  if(id==='tasks') renderAllTasks();
  if(id==='report') renderCalendar();
  if(id==='admin') renderAdminPage();
  addLog('NAV', '페이지 이동: '+id);
}

function closeModal(id){ document.getElementById(id).classList.remove('show'); }
document.querySelectorAll('.overlay').forEach(m=>m.addEventListener('click',function(e){if(e.target===this)this.classList.remove('show')}));

// ─── START ────────────────────────────────────────────────────────────────────
init();
</script>
